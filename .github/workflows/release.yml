name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BIN: pg_lens

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux musl)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # dist/ is not committed; pg_lens_web's build.rs requires it
      - name: Build frontend bundle
        run: npm ci && npm run build
        working-directory: crates/pg_lens_web/frontend
      # pip package bundles the zig compiler (per cargo-zigbuild README)
      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild
      - name: Build
        run: cargo zigbuild --release -p pg_lens_tui --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          pkg="pg_lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$pkg"
          cp "target/${{ matrix.target }}/release/${BIN}" "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pg_lens-${{ matrix.target }}
          path: |
            pg_lens-*.tar.gz
            pg_lens-*.tar.gz.sha256

  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # dist/ is not committed; pg_lens_web's build.rs requires it
      - name: Build frontend bundle
        run: npm ci && npm run build
        working-directory: crates/pg_lens_web/frontend
      - name: Build
        run: cargo build --release -p pg_lens_tui --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          pkg="pg_lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$pkg"
          cp "target/${{ matrix.target }}/release/${BIN}" "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pg_lens-${{ matrix.target }}
          path: |
            pg_lens-*.tar.gz
            pg_lens-*.tar.gz.sha256

  release:
    name: Publish GitHub release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    env:
      # Secrets cannot be referenced in `if:` conditions, so the guard is a
      # runtime check on this env var (empty when the secret is not set).
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - name: Check for tap token
        id: token
        run: |
          if [ -z "${TAP_GITHUB_TOKEN}" ]; then
            echo "::notice::TAP_GITHUB_TOKEN secret is not configured — skipping the Homebrew tap update. Publish manually with scripts/gen_formula.sh (see its header)."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.token.outputs.available == 'true'
      # The .sha256 files were uploaded as workflow artifacts by the build
      # jobs (and published to the release) — read them from the artifacts.
      - uses: actions/download-artifact@v4
        if: steps.token.outputs.available == 'true'
        with:
          path: dist
          merge-multiple: true
      - name: Generate formula
        if: steps.token.outputs.available == 'true'
        run: |
          set -euo pipefail
          sha() { cut -d' ' -f1 "dist/pg_lens-${GITHUB_REF_NAME}-$1.tar.gz.sha256"; }
          scripts/gen_formula.sh "${GITHUB_REF_NAME#v}" \
            "$(sha aarch64-apple-darwin)" \
            "$(sha x86_64-apple-darwin)" \
            "$(sha aarch64-unknown-linux-musl)" \
            "$(sha x86_64-unknown-linux-musl)" \
            > pg_lens.rb
          ruby -c pg_lens.rb
          cat pg_lens.rb
      - name: Commit formula to the tap
        if: steps.token.outputs.available == 'true'
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/dog-hero/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp pg_lens.rb tap/Formula/pg_lens.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pg_lens.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "pg_lens ${GITHUB_REF_NAME}"
          git push

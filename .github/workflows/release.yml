name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BIN: pg_lens

permissions:
  contents: write
  packages: write # docker job pushes to GHCR with GITHUB_TOKEN

jobs:
  build-linux:
    name: Build (Linux musl)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # dist/ is not committed; pg_lens_web's build.rs requires it
      - name: Build frontend bundle
        run: npm ci && npm run build
        working-directory: crates/pg_lens_web/frontend
      # pip package bundles the zig compiler (per cargo-zigbuild README)
      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild
      - name: Build
        run: cargo zigbuild --release -p pg_lens_tui --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          pkg="pg_lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$pkg"
          cp "target/${{ matrix.target }}/release/${BIN}" "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pg_lens-${{ matrix.target }}
          path: |
            pg_lens-*.tar.gz
            pg_lens-*.tar.gz.sha256

  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # dist/ is not committed; pg_lens_web's build.rs requires it
      - name: Build frontend bundle
        run: npm ci && npm run build
        working-directory: crates/pg_lens_web/frontend
      - name: Build
        run: cargo build --release -p pg_lens_tui --target ${{ matrix.target }}
      - name: Package
        run: |
          set -euo pipefail
          pkg="pg_lens-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$pkg"
          cp "target/${{ matrix.target }}/release/${BIN}" "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pg_lens-${{ matrix.target }}
          path: |
            pg_lens-*.tar.gz
            pg_lens-*.tar.gz.sha256

  # Builds from source inside the Dockerfile (frontend + musl), so it does
  # not depend on the tarball artifacts — runs in parallel with the builds.
  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # arm64 layers are built under emulation (rustc via QEMU is slow but
      # correct); buildx drives the multi-platform build.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # v0.2.0 → 0.2.0, 0.2 and latest (latest=auto on semver tags).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # deb/rpm (amd64+arm64) from the musl tarballs via nfpm — one config
  # (nfpm.yaml), arch/version injected through env vars.
  packages:
    name: Packages (deb/rpm)
    needs: build-linux
    runs-on: ubuntu-latest
    env:
      NFPM_VER: 2.47.0 # pinned; https://github.com/goreleaser/nfpm/releases
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          # Only the Linux tarballs — the macOS jobs may still be running.
          pattern: pg_lens-*-linux-musl
          path: dist
          merge-multiple: true
      - name: Install nfpm
        run: |
          set -euo pipefail
          curl -fsSL -o nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz"
          tar xzf nfpm.tar.gz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm
          nfpm --version
      - name: Stage binaries
        run: |
          set -euo pipefail
          stage() { # $1 = rust target triple, $2 = GOARCH-style arch
            tar xzf "dist/pg_lens-${GITHUB_REF_NAME}-$1.tar.gz"
            mkdir -p "pkg/$2"
            cp "pg_lens-${GITHUB_REF_NAME}-$1/pg_lens" "pkg/$2/pg_lens"
          }
          stage x86_64-unknown-linux-musl amd64
          stage aarch64-unknown-linux-musl arm64
      # Debian policy wants /usr/share/doc/<pkg>/changelog.gz whose latest
      # entry matches the package version (lintian: no-changelog).
      - name: Generate Debian changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          printf '%s\n' \
            "pg-lens (${version}) unstable; urgency=medium" \
            "" \
            "  * See https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            "" \
            " -- Leonardo Benedet <leonardobenedetster@gmail.com>  $(date -R -u)" \
            | gzip -9 -n > pkg/changelog.gz
      - name: Build packages
        run: |
          set -euo pipefail
          export NFPM_VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p packages
          for arch in amd64 arm64; do
            for fmt in deb rpm; do
              # --target with a directory: nfpm picks the conventional file
              # name (pg_lens_X.Y.Z_amd64.deb / pg_lens-X.Y.Z-1.x86_64.rpm).
              NFPM_ARCH="$arch" nfpm package \
                --config nfpm.yaml --packager "$fmt" --target packages/
            done
          done
          (cd packages && for f in *; do shasum -a 256 "$f" > "$f.sha256"; done)
          ls -l packages/
      - uses: actions/upload-artifact@v4
        with:
          name: pg_lens-packages
          path: packages/*

  release:
    name: Publish GitHub release
    needs: [build-linux, build-macos, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    env:
      # Secrets cannot be referenced in `if:` conditions, so the guard is a
      # runtime check on this env var (empty when the secret is not set).
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - name: Check for tap token
        id: token
        run: |
          if [ -z "${TAP_GITHUB_TOKEN}" ]; then
            echo "::notice::TAP_GITHUB_TOKEN secret is not configured — skipping the Homebrew tap update. Publish manually with scripts/gen_formula.sh (see its header)."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.token.outputs.available == 'true'
      # The .sha256 files were uploaded as workflow artifacts by the build
      # jobs (and published to the release) — read them from the artifacts.
      - uses: actions/download-artifact@v4
        if: steps.token.outputs.available == 'true'
        with:
          path: dist
          merge-multiple: true
      - name: Generate formula
        if: steps.token.outputs.available == 'true'
        run: |
          set -euo pipefail
          sha() { cut -d' ' -f1 "dist/pg_lens-${GITHUB_REF_NAME}-$1.tar.gz.sha256"; }
          scripts/gen_formula.sh "${GITHUB_REF_NAME#v}" \
            "$(sha aarch64-apple-darwin)" \
            "$(sha x86_64-apple-darwin)" \
            "$(sha aarch64-unknown-linux-musl)" \
            "$(sha x86_64-unknown-linux-musl)" \
            > pg_lens.rb
          scripts/gen_cask.sh "${GITHUB_REF_NAME#v}" \
            "$(sha aarch64-apple-darwin)" \
            "$(sha x86_64-apple-darwin)" \
            > pg_lens_cask.rb
          ruby -c pg_lens.rb
          ruby -c pg_lens_cask.rb
          cat pg_lens.rb pg_lens_cask.rb
      - name: Commit formula to the tap
        if: steps.token.outputs.available == 'true'
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/dog-hero/homebrew-tap.git" tap
          mkdir -p tap/Formula tap/Casks
          cp pg_lens.rb tap/Formula/pg_lens.rb
          cp pg_lens_cask.rb tap/Casks/pg_lens.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pg_lens.rb Casks/pg_lens.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "pg_lens ${GITHUB_REF_NAME}"
          git push

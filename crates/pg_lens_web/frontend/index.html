<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>pg_lens</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">pg_lens</span>
        <span id="server-info" class="server-info"></span>
        <span id="conn-state" class="conn-state" data-state="connecting">connecting…</span>
      </header>
      <div id="status-banner" hidden></div>
      <main>
        <section id="vitals" class="cards"></section>
        <section class="panel">
          <h2>TPS &amp; active sessions</h2>
          <div id="chart"></div>
        </section>
        <nav id="tabs" role="tablist">
          <button
            id="tab-activity"
            role="tab"
            aria-selected="true"
            aria-controls="activity-panel"
          >
            Activity
          </button>
          <button
            id="tab-schema"
            role="tab"
            aria-selected="false"
            aria-controls="schema-panel"
          >
            Schema
          </button>
        </nav>
        <section id="activity-panel" class="panel" role="tabpanel">
          <h2>Activity</h2>
          <div class="table-wrap">
            <table id="activity">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
        <section id="schema-panel" class="panel" role="tabpanel" hidden>
          <h2>Schema <span class="panel-note">estimated bloat</span></h2>
          <p id="schema-staleness" class="staleness"></p>
          <p id="schema-warning" class="inline-warning" hidden></p>
          <p id="schema-placeholder" class="placeholder">collecting…</p>
          <div class="table-wrap">
            <table id="schema">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
      <div id="token-overlay" hidden>
        <form id="token-form">
          <h2>Authentication required</h2>
          <p>
            This server was started with <code>PG_LENS_AUTH_TOKEN</code>.
            Paste the token to connect.
          </p>
          <input
            id="token-input"
            type="password"
            autocomplete="off"
            placeholder="bearer token"
          />
          <button type="submit">Connect</button>
          <p id="token-error" class="token-error" hidden>Invalid token.</p>
        </form>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

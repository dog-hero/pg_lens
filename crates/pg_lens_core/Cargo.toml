[package]
name = "pg_lens_core"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
# Minimal feature set on purpose: the core only spawns the poller task ("rt"),
# publishes through watch channels ("sync") and sleeps between polls ("time").
tokio = { version = "1.52.3", features = ["rt", "sync", "time"] }
tokio-postgres = "0.7.18"

[dev-dependencies]
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["macros"] }
